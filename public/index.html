<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Interior Designer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1b1f2a;
        --muted: #687086;
        --accent: #4f46e5;
        --accent-hover: #4338ca;
        --border: #dde3f0;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 1024px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }

      h1 {
        margin: 0 0 0.5rem;
      }

      .subtitle {
        color: var(--muted);
        margin-bottom: 1.5rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
        box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
      }

      form {
        display: grid;
        gap: 0.85rem;
      }

      label {
        font-weight: 600;
        font-size: 0.95rem;
      }

      input,
      button {
        font: inherit;
      }

      input[type="text"],
      input[type="number"],
      input[type="file"] {
        padding: 0.65rem;
        border-radius: 10px;
        border: 1px solid var(--border);
      }

      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        padding: 0.7rem 1rem;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button:disabled {
        opacity: 0.55;
        cursor: progress;
      }

      .status {
        margin-top: 1rem;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .grid {
        margin-top: 1.5rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1rem;
      }

      .design {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .design img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        display: block;
      }

      .design .meta {
        padding: 0.75rem;
      }

      .design .meta h3 {
        margin: 0 0 0.45rem;
        font-size: 1rem;
      }

      .warning {
        color: #92400e;
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 10px;
        padding: 0.65rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>AI Interior Designer</h1>
      <p class="subtitle">
        Upload a room photo and generate multiple AI redesign options by style.
      </p>

      <div class="card">
        <form id="designForm">
          <div>
            <label for="roomImage">Room photo</label><br />
            <input id="roomImage" name="roomImage" type="file" accept="image/*" required />
          </div>

          <div>
            <label for="styles">Styles (comma-separated)</label><br />
            <input
              id="styles"
              name="styles"
              type="text"
              value="Modern, Scandinavian, Japandi"
            />
          </div>

          <div>
            <label for="numDesigns">Number of designs</label><br />
            <input id="numDesigns" name="numDesigns" type="number" min="1" max="6" value="3" />
          </div>

          <button id="submitBtn" type="submit">Generate Designs</button>
        </form>
        <div id="status" class="status"></div>
      </div>

      <div id="designGrid" class="grid"></div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
